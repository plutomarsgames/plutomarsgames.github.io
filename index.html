<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plutomars Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0b0f1a,#020617);
  color:white;
}

.container{
  width:95%;
  max-width:1300px;
  margin:auto;
}

/* HEADER */
header{
  background:#0a0d16;
  padding:10px 0;
}
.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo img{
  height:65px;
  filter: drop-shadow(0 0 10px #ff00ff);
}
.nav{
  display:flex;
  gap:30px;
}
.nav a{
  color:#aaa;
  text-decoration:none;
  font-weight:bold;
}
.nav a:hover{color:#ff00ff;}

/* HERO */
.hero{
  position:relative;
  height:60vh;
  display:flex;
  align-items:center;
  overflow:hidden;
  background:radial-gradient(circle at center,#0b0f1a,#020617);
}
.slider{
  position:absolute;
  width:110%;
  height:110%;
  top:-5%;
  left:-5%;
  transition:0.2s;
}
.slide{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:1s;
}
.slide.active{opacity:1;}

/* IMPORTANT: don't block clicks */
.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to right, rgba(0,0,0,0.8), transparent);
  pointer-events:none;
}

.hero-box{
  position:relative;
  z-index:2;
  background:rgba(0,0,0,0.5);
  padding:30px;
  border-radius:10px;
}

.glow-text{
  color:#ff00ff;
  text-shadow:0 0 20px #ff00ff;
}

/* SMALL EXPLORE */
.explore-btn{
  margin-top:10px;
  width:25%;          /* 👈 makes it 25% */
  min-width:120px;    /* 👈 prevents too small on mobile */
  padding:8px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#ff00ff,#ff4dff);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.explore-btn:hover{
  box-shadow:0 0 12px #ff00ff;
}
/* SECTION */
.section{padding:40px 0;}

/* GAMES */
.games-row{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

/* GLOW CARD (unchanged feel) */
.card{
  width:220px;
  background:#0f172a;
  padding:12px;
  border-radius:14px;
  position:relative;
  overflow:hidden;
  transition:0.4s;
  z-index:1;
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:14px;
  padding:2px;
  background:linear-gradient(45deg,#ff00ff,#7a00ff,#ff00ff);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  opacity:0;
  transition:0.4s;
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,0,255,0.5), transparent);
  transition:0.6s;
}

.card:hover::before{left:100%;}
.card:hover::after{opacity:1;}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:
    0 0 20px #ff00ff,
    0 0 40px rgba(255,0,255,0.6),
    0 0 70px rgba(255,0,255,0.3);
}

.card img{
  width:100%;
  border-radius:10px;
}

/* BUTTON FIXED */
.play-btn{
  margin-top:10px;
  width:100%;
  padding:8px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#ff00ff,#ff4dff);
  color:white;
  font-weight:bold;
  cursor:pointer;
  position:relative;
  z-index:5;
}

.play-btn:hover{
  box-shadow:0 0 15px #ff00ff;
}

/* ABOUT */
.about-box{
  background:#0f172a;
  padding:20px;
  border-radius:12px;
  color:#ccc;
}

/* MOBILE */
@media(max-width:600px){
  .hero{height:50vh;}
  .games-row{overflow-x:auto;flex-wrap:nowrap;}
  .card{min-width:160px;}
}
</style>
</head>

<body>

<header>
<div class="container header-inner">
  <div class="logo">
    <img src="assets/logo.png">
  </div>
  <div class="nav">
    <a href="#home">HOME</a>
    <a href="#games">GAMES</a>
    <a href="#about">ABOUT</a>
  </div>
</div>
</header>

<!-- HERO -->
<div id="home" class="hero">
  <div class="slider">
    <img src="assets/banner1.jpg" class="slide active">
    <img src="assets/banner2.jpg" class="slide">
    <img src="assets/banner3.jpg" class="slide">
  </div>

  <div class="container">
    <div class="hero-box">
      <h1>PLAY GAMES.<br><span class="glow-text">HAVE FUN.</span></h1>
      <button class="play-btn" onclick="scrollToGames()">🎮 EXPLORE</button>
    </div>
  </div>
</div>

<!-- GAMES -->
<div id="games" class="section">
<div class="container">
<h2>🎮 FEATURED GAMES</h2>

<div class="games-row">

<div class="card">
<img src="assets/mines.jpg">
<p>MINES</p>
<button class="TRY-btn"
onclick="event.stopPropagation(); openGame('MINES','https://plutomarsgames.github.io/plutomarsgames01.github.io/')">
▶ TRY NOW
</button>
</div>

<div class="card">
<img src="assets/findcoins.jpg">
<p>FIND COINS</p>
<button class="TRY-btn"
onclick="event.stopPropagation(); openGame('FIND COINS','https://plutomarsgames.github.io/plutomarsgames02.github.io/')">
▶ TRY NOW
</button>
</div>

<div class="card">
<img src="assets/carracing.jpg">
<p>CAR RACING</p>
<button class="TRY-btn"
onclick="event.stopPropagation(); openGame('CAR RACING','https://plutomarsgames.github.io/plutomarsgames03.github.io/')">
▶ TRY NOW
</button>
</div>

</div>
</div>
</div>

<!-- ABOUT -->
<div id="about" class="section">
<div class="container">
<h2>ABOUT</h2>
<div class="about-box">
Plutomars Games is a fast and modern browser gaming platform designed for instant play. Enjoy smooth gameplay across devices without downloads.
</div>
</div>
</div>

<script>
/* SLIDER */
let slides=document.querySelectorAll(".slide");
let i=0;

setInterval(()=>{
  slides[i].classList.remove("active");
  i=(i+1)%slides.length;
  slides[i].classList.add("active");
},3000);

/* GYRO */
document.addEventListener("mousemove", e=>{
  let x=(e.clientX/window.innerWidth-0.5)*10;
  let y=(e.clientY/window.innerHeight-0.5)*10;
  document.querySelector(".slider").style.transform=`translate(${x}px,${y}px)`;
});

/* SCROLL */
function scrollToGames(){
  document.getElementById("games").scrollIntoView({behavior:"smooth"});
}

/* FINAL WORKING GAME FUNCTION */
function openGame(name,url){
  window.location.href = "play.html?name=" + encodeURIComponent(name) + "&url=" + encodeURIComponent(url);
}
</script>

</body>
</html>
