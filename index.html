<!DOCTYPE html>
<html>
<head>
  <title>Plutomars Coin Hunt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="start-screen">
  <h1>🚀 PLUTOMARS GAMES</h1>

  <input type="text" id="username" placeholder="Enter username"><br>

  <button onclick="createRoom()">Create Room</button>
  <br><br>

  <input type="text" id="roomInput" placeholder="Enter Room Code">
  <button onclick="joinRoom()">Join Room</button>

  <br><br><hr>

  <button onclick="playWithBot()">Play with BLACKMITH 🤖</button>
</div>

<div id="game-screen" class="hidden">
  <h2 id="player"></h2>
  <h3>Coins: <span id="score">0</span></h3>
  <div id="grid"></div>
</div>

<div id="winner-banner" class="hidden">
  <h1 id="winner-text"></h1>
  <button onclick="resetGame()">Play Again</button>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
