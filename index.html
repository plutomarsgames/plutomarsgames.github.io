<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plutomars Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0b0f1a,#020617);
  color:white;
}

html{
  scroll-behavior:smooth;
}

/* CONTAINER */
.container{
  width:95%;
  max-width:1300px;
  margin:auto;
}

/* HEADER */
header{
  background:#0a0d16;
  padding:10px 0;
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* LOGO */
.logo img{
  height:65px;
  filter: drop-shadow(0 0 10px #ff00ff);
}

/* NAV */
.nav{
  display:flex;
  gap:30px;
}

.nav a{
  color:#aaa;
  text-decoration:none;
  font-weight:bold;
  position:relative;
}

.nav a:hover{
  color:#ff00ff;
}

.nav a::after{
  content:"";
  position:absolute;
  width:0;
  height:2px;
  background:#ff00ff;
  left:0;
  bottom:-4px;
  transition:0.3s;
}

.nav a:hover::after{
  width:100%;
}

.live{
  color:red;
}

.live::after{
  content:" LIVE";
  font-size:10px;
}

/* HERO */
.hero{
  height:60vh;
  background:url("assets/hero.jpg") center/cover no-repeat;
  display:flex;
  align-items:center;
}

.hero-box{
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:10px;
  max-width:500px;
  animation:fadeIn 1s forwards;
}

.hero h1{
  font-size:34px;
}

.hero span{
  color:#ff00ff;
}

.hero p{
  color:#ccc;
}

.btn{
  background:#ff00ff;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px #ff00ff;
}

/* SECTION */
.section{
  padding:40px 0;
  animation:fadeIn 1s forwards;
}

/* GAMES */
.games-row{
  display:flex;
  flex-wrap:wrap;
  gap:25px;
  margin-top:20px;
}

/* CARD */
.card{
  width:220px;
  background:#0f172a;
  padding:12px;
  border-radius:12px;
  transition:0.4s;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,0,255,0.4), transparent);
  transition:0.5s;
}

.card:hover::before{
  left:100%;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 0 25px #ff00ff;
}

.card img{
  width:100%;
  border-radius:10px;
}

.card h3{
  font-size:14px;
}

.card p{
  font-size:12px;
  color:#aaa;
}

.card button{
  margin-top:5px;
  background:#ff00ff;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  color:white;
}

/* LIVE */
#liveVideo{
  margin-top:15px;
  background:#000;
  padding:10px;
  border-radius:10px;
}

/* FADE ANIMATION */
@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* SCROLLBAR */
::-webkit-scrollbar{
  height:6px;
}

::-webkit-scrollbar-thumb{
  background:#ff00ff;
  border-radius:10px;
}

/* MOBILE */
@media(max-width:600px){
  .logo img{height:45px;}
  .nav{gap:12px;font-size:12px;}
  .games-row{overflow-x:auto;flex-wrap:nowrap;}
  .card{min-width:160px;}
  .hero{height:50vh;}
  .hero h1{font-size:22px;}
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">

    <div class="logo">
      <img src="assets/logo.png">
    </div>

    <div class="nav">
      <a href="#home">HOME</a>
      <a href="#games">GAMES</a>
      <a href="#live" class="live">● LIVE</a>
    </div>

  </div>
</header>

<!-- HERO -->
<div id="home" class="hero">
  <div class="container">
    <div class="hero-box">
      <h1>PLAY GAMES.<br><span>HAVE FUN.</span></h1>
      <p>The best place to play free online games!</p>
      <button class="btn">🎮 EXPLORE</button>
    </div>
  </div>
</div>

<!-- GAMES -->
<div id="games" class="section">
  <div class="container">
    <h2>🎮 FEATURED GAMES</h2>

    <div class="games-row">

      <div class="card">
        <img src="assets/mines.jpg">
        <h3>MINES</h3>
        <button onclick="playGame('Mines','https://plutomarsgames.github.io/plutomarsgames01.github.io/')">▶ PLAY</button>
      </div>

      <div class="card">
        <img src="assets/findcoins.jpg">
        <h3>FIND COINS</h3>
        <button onclick="playGame('Find Coins','https://plutomarsgames.github.io/plutomarsgames02.github.io/')">▶ PLAY</button>
      </div>

      <div class="card">
        <img src="assets/carracing.jpg">
        <h3>CAR RACING</h3>
        <button onclick="playGame('Car Racing','https://plutomarsgames.github.io/plutomarsgames03.github.io/')">▶ PLAY</button>
      </div>

    </div>
  </div>
</div>

<!-- LIVE -->
<div id="live" class="section">
  <div class="container">
    <h2>🔴 LIVE STREAM</h2>

    <div id="liveVideo">Loading live...</div>

    <h2 style="margin-top:20px;">LATEST VIDEOS</h2>
    <div id="videoList" class="games-row"></div>
  </div>
</div>

<script>
const API_KEY = "AIzaSyA_4LCieXQLzVHX7APxfr5_b6MtbgmPHjA";
const CHANNEL_ID = "UCdO65ekLVmHT48V-kJFE_Fg";

/* LIVE */
async function loadLive(){
  try{
    let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`);
    let data = await res.json();

    if(data.items && data.items.length > 0){
      let id = data.items[0].id.videoId;
      document.getElementById("liveVideo").innerHTML =
      `<iframe width="100%" height="300" src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
    } else {
      document.getElementById("liveVideo").innerHTML = "<p>No live stream now</p>";
    }
  }catch{
    document.getElementById("liveVideo").innerHTML = "<p>Live unavailable</p>";
  }
}

/* VIDEOS */
async function loadVideos(){
  try{
    let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&maxResults=6&type=video&order=date&key=${API_KEY}`);
    let data = await res.json();

    let html="";
    data.items.forEach(v=>{
      html+=`
      <div class="card" onclick="window.open('https://youtube.com/watch?v=${v.id.videoId}','_blank')">
        <img src="${v.snippet.thumbnails.high.url}">
        <p>${v.snippet.title}</p>
      </div>`;
    });

    document.getElementById("videoList").innerHTML = html;
  }catch{
    document.getElementById("videoList").innerHTML = "<p>Videos not loading</p>";
  }
}

/* AUTO LOAD */
loadLive();
loadVideos();

/* AUTO REFRESH */
setInterval(()=>{
  loadLive();
  loadVideos();
},30000);

/* PLAY GAME */
function playGame(name,url){
  if(window.innerWidth < 768){
    window.open(url, "_self");
  }else{
    window.location.href="play.html?name="+name+"&url="+url;
  }
}
</script>

</body>
</html>
