<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plutomars Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

/* NAVBAR */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#0a0d16;
}

.logo img{
  height:45px;
}

.nav{
  display:flex;
  gap:18px;
  font-size:14px;
}

.nav a{
  color:#aaa;
  text-decoration:none;
  font-weight:bold;
}

.nav a:hover{
  color:gold;
}

.nav a:first-child{
  color:gold;
  border-bottom:2px solid gold;
}

.live{
  color:red;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.5;}
}

/* HERO */
.hero{
  height:55vh;
  background:url("assets/hero.jpg") center/cover no-repeat;
  display:flex;
  align-items:center;
}

.overlay{
  background:linear-gradient(to right, rgba(0,0,0,0.8), transparent);
  padding:25px;
  margin-left:20px;
  border-radius:10px;
}

.hero h1{
  font-size:30px;
}

.hero span{
  color:gold;
}

.btn{
  background:gold;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  font-size:12px;
}

/* SECTION */
.section{
  padding:15px;
}

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* SCROLL ROW */
.scroll-row{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding-top:10px;
}

.scroll-row::-webkit-scrollbar{
  display:none;
}

/* CARD */
.card{
  min-width:160px;
  background:#0f172a;
  border-radius:14px;
  overflow:hidden;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:0 0 20px gold;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-content{
  padding:8px;
}

.card h3{
  font-size:13px;
  margin:5px 0;
}

.card p{
  font-size:11px;
  color:#aaa;
}

.card button{
  margin-top:5px;
}

/* MOBILE */
@media(max-width:600px){
  .hero{
    height:45vh;
  }

  .hero h1{
    font-size:22px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="assets/logo.png">
  </div>

  <div class="nav">
    <a href="#">HOME</a>
    <a href="#">TRENDING</a>
    <a href="#" class="live">🔴 LIVE</a>
    <a href="#">ALL</a>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="overlay">
    <h1>PLAY GAMES.<br><span>HAVE FUN.</span></h1>
    <button class="btn">🎮 EXPLORE</button>
  </div>
</div>

<!-- FEATURED -->
<div class="section">
  <div class="section-header">
    <h3>🎮 FEATURED GAMES</h3>
    <span style="color:gold;">VIEW ALL ➤</span>
  </div>

  <div class="scroll-row">

    <!-- MINES -->
    <div class="card">
      <img src="assets/mines.jpg">
      <div class="card-content">
        <h3>MINES</h3>
        <p>Classic mind game</p>
        <button class="btn"
        onclick="playGame('Mines','https://plutomarsgames.github.io/plutomarsgames01.github.io/')">
        ▶ PLAY
        </button>
      </div>
    </div>

    <!-- FIND COINS -->
    <div class="card">
      <img src="assets/findcoins.jpg">
      <div class="card-content">
        <h3>FIND COINS</h3>
        <p>Collect & survive</p>
        <button class="btn"
        onclick="playGame('Find Coins','https://plutomarsgames.github.io/plutomarsgames02.github.io/')">
        ▶ PLAY
        </button>
      </div>
    </div>

  </div>
</div>

<!-- TRENDING (COPY SECTION FOR PRO LOOK) -->
<div class="section">
  <div class="section-header">
    <h3>🔥 TRENDING</h3>
  </div>

  <div class="scroll-row">

    <!-- SAME GAMES (FOR NOW) -->
    <div class="card">
      <img src="assets/mines.jpg">
      <div class="card-content">
        <h3>MINES</h3>
        <button class="btn"
        onclick="playGame('Mines','https://plutomarsgames.github.io/plutomarsgames01.github.io/')">
        ▶ PLAY
        </button>
      </div>
    </div>

    <div class="card">
      <img src="assets/findcoins.jpg">
      <div class="card-content">
        <h3>FIND COINS</h3>
        <button class="btn"
        onclick="playGame('Find Coins','https://plutomarsgames.github.io/plutomarsgames02.github.io/')">
        ▶ PLAY
        </button>
      </div>
    </div>

  </div>
</div>

<script>
function playGame(name, url){
  window.location.href =
  "play.html?name="+encodeURIComponent(name)+
  "&url="+encodeURIComponent(url);
}
</script>

</body>
</html>
