<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plutomars Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050816;
  color:white;
}

/* CONTAINER */
.container{
  width:90%;
  max-width:1200px;
  margin:auto;
}

/* HEADER */
header{
  background:#0a0d16;
  padding:10px 0;
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo img{
  height:60px;
}

.nav{
  display:flex;
  gap:20px;
}

.nav a{
  color:#aaa;
  text-decoration:none;
  font-weight:bold;
}

.nav a:hover{
  color:#ff00ff;
}

.live{
  color:red;
}

/* HERO */
.hero{
  height:60vh;
  background:url("assets/hero.jpg") center/cover no-repeat;
  display:flex;
  align-items:center;
}

.hero-box{
  background:rgba(0,0,0,0.6);
  padding:25px;
  border-radius:10px;
}

.btn{
  background:#ff00ff;
  border:none;
  padding:10px;
  color:white;
  border-radius:8px;
}

/* SECTION */
.section{
  padding:40px 0;
}

.games-row{
  display:flex;
  gap:20px;
  overflow-x:auto;
}

.card{
  width:200px;
  background:#0f172a;
  border-radius:10px;
  padding:10px;
}

.card img{
  width:100%;
}

/* VIDEO */
.video-card{
  width:220px;
  background:#0f172a;
  border-radius:10px;
  overflow:hidden;
}

.video-card img{
  width:100%;
}

.video-card p{
  padding:8px;
  font-size:12px;
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <div class="logo">
      <img src="assets/logo.png">
    </div>

    <div class="nav">
      <a href="#home">HOME</a>
      <a href="#games">GAMES</a>
      <a href="#live" class="live">● LIVE</a>
    </div>
  </div>
</header>

<!-- HERO -->
<div id="home" class="hero">
  <div class="container">
    <div class="hero-box">
      <h1>PLAY GAMES.<br>HAVE FUN.</h1>
      <button class="btn">EXPLORE</button>
    </div>
  </div>
</div>

<!-- GAMES -->
<div id="games" class="section">
  <div class="container">
    <h2>FEATURED GAMES</h2>

    <div class="games-row">

      <div class="card">
        <img src="assets/mines.jpg">
        <p>MINES</p>
        <button onclick="playGame('Mines','https://plutomarsgames.github.io/plutomarsgames01.github.io/')">PLAY</button>
      </div>

      <div class="card">
        <img src="assets/findcoins.jpg">
        <p>FIND COINS</p>
        <button onclick="playGame('Find Coins','https://plutomarsgames.github.io/plutomarsgames02.github.io/')">PLAY</button>
      </div>

    </div>
  </div>
</div>

<!-- LIVE -->
<div id="live" class="section">
  <div class="container">
    <h2>🔴 LIVE STREAM</h2>

    <div id="liveVideo"></div>

    <h2>Latest Videos</h2>
    <div id="videoList" class="games-row"></div>
  </div>
</div>

<script>
const API_KEY = "AIzaSyA_4LCieXQLzVHX7APxfr5_b6MtbgmPHjA";
const CHANNEL_ID = "UCdO65ekLVmHT48V-kJFE_Fg";

async function loadLive(){
  let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`;
  let res = await fetch(url);
  let data = await res.json();

  if(data.items.length > 0){
    let id = data.items[0].id.videoId;
    liveVideo.innerHTML = `<iframe width="100%" height="300"
    src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
  }else{
    liveVideo.innerHTML = "<p>No live stream now</p>";
  }
}

async function loadVideos(){
  let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&maxResults=6&order=date&type=video&key=${API_KEY}`;
  let res = await fetch(url);
  let data = await res.json();

  let html="";
  data.items.forEach(v=>{
    html+=`
    <div class="video-card">
      <img src="${v.snippet.thumbnails.high.url}">
      <p>${v.snippet.title}</p>
    </div>`;
  });

  videoList.innerHTML = html;
}

loadLive();
loadVideos();

function playGame(name,url){
  window.location.href="play.html?name="+name+"&url="+url;
}
</script>

</body>
</html>
