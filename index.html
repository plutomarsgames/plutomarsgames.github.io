<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plutomars Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

/* NAVBAR */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#0a0d16;
}

.logo img{
  height:55px;
  filter:drop-shadow(0 0 10px #ff00ff);
}

.nav{
  display:flex;
  gap:25px;
}

.nav a{
  color:#aaa;
  text-decoration:none;
  font-weight:bold;
}

.nav a:hover{
  color:gold;
}

.live{
  color:red;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.5;}
}

/* HERO */
.hero{
  height:80vh;
  background:url("assets/hero.jpg") center/cover no-repeat;
  display:flex;
  align-items:center;
}

.overlay{
  background:rgba(0,0,0,0.6);
  padding:40px;
  margin-left:50px;
  border-radius:10px;
}

.hero h1{
  font-size:50px;
  line-height:1.2;
}

.hero span{
  color:gold;
}

.hero p{
  color:#ccc;
}

.btn{
  background:gold;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* SECTION */
.section{
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:#111827;
  border-radius:15px;
  padding:10px;
  transition:0.3s;
  box-shadow:0 0 10px rgba(255,255,255,0.05);
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 20px gold;
}

.card img{
  width:100%;
  border-radius:10px;
}

.card h3{
  margin:10px 0;
}

.card p{
  color:#aaa;
  font-size:14px;
}

/* MOBILE */
@media(max-width:768px){
  .hero{
    height:60vh;
  }

  .hero h1{
    font-size:28px;
  }

  .overlay{
    margin:20px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="assets/logo.png">
  </div>

  <div class="nav">
    <a href="#">HOME</a>
    <a href="#">TRENDING</a>
    <a href="#" class="live">🔴 LIVE</a>
    <a href="#">ALL GAMES</a>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="overlay">
    <h1>ELEVATE YOUR<br>GAMING EXPERIENCE<br><span>WITH AI.</span></h1>
    <p>The best place to play modern online games</p>
    <button class="btn">GET STARTED</button>
  </div>
</div>

<!-- GAMES -->
<div class="section">
  <h2>🎮 PLAY NOW</h2>

  <div class="grid">

    <!-- MINES -->
    <div class="card">
      <img src="assets/mines.jpg">
      <h3>MINES</h3>
      <p>Classic mind game</p>
      <button class="btn"
      onclick="playGame('Mines','https://plutomarsgames.github.io/plutomarsgames01.github.io/')">
      ▶ PLAY NOW
      </button>
    </div>

    <!-- FIND COINS -->
    <div class="card">
      <img src="assets/findcoins.jpg">
      <h3>FIND COINS</h3>
      <p>Collect coins and survive the adventure</p>
      <button class="btn"
      onclick="playGame('Find Coins','https://plutomarsgames.github.io/plutomarsgames02.github.io/')">
      ▶ PLAY NOW
      </button>
    </div>

  </div>
</div>

<script>
function playGame(name, url){
  window.location.href =
  "play.html?name="+encodeURIComponent(name)+
  "&url="+encodeURIComponent(url);
}
</script>

</body>
</html>
