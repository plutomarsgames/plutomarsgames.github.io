<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plutomars Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

/* NAVBAR */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#0a0d16;
}

.logo img{
  height:55px;
  filter:drop-shadow(0 0 10px #ff00ff);
}

.nav{
  display:flex;
  gap:20px;
  align-items:center;
}

.nav a{
  text-decoration:none;
  color:#aaa;
  font-weight:bold;
}

.nav a:hover{
  color:gold;
}

.live{
  color:red;
  font-weight:bold;
}

/* HERO */
.hero{
  margin:20px;
  border-radius:20px;
  padding:40px;
  background:linear-gradient(90deg,#000,#111);
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.hero-text{
  max-width:500px;
}

.hero h1{
  font-size:50px;
}

.hero span{
  color:gold;
}

.hero p{
  color:#aaa;
}

.btn{
  background:gold;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* GAMES */
.section{
  padding:20px;
}

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:15px;
}

.card{
  background:#111827;
  border-radius:15px;
  padding:10px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  border-radius:10px;
}

.card h3{
  margin:10px 0;
}

.card p{
  color:#aaa;
  font-size:14px;
}

/* MOBILE */
@media(max-width:768px){
  .hero h1{font-size:32px;}
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="assets/logo.png">
  </div>

  <div class="nav">
    <a href="#">HOME</a>
    <a href="#">TRENDING</a>
    <a href="#" class="live">🔴 LIVE</a>
    <a href="#">ALL GAMES</a>
    <a href="#">FAVORITES</a>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="hero-text">
    <h1>PLAY GAMES.<br><span>HAVE FUN.</span></h1>
    <p>The best place to play free online games!</p>
    <button class="btn">🎮 EXPLORE GAMES</button>
  </div>
</div>

<!-- FEATURED -->
<div class="section">
  <div class="section-header">
    <h2>🎮 FEATURED GAMES</h2>
    <button class="btn">VIEW ALL</button>
  </div>

  <div class="grid">

    <div class="card">
      <img src="https://img.icons8.com/color/480/minesweeper.png">
      <h3>MINES</h3>
      <p>Classic mind game</p>
      <button class="btn"
      onclick="playGame('Mines','https://plutomarsgames.github.io/plutomarsgames01.github.io/')">
      ▶ PLAY NOW
      </button>
    </div>

    <div class="card">
      <img src="https://img.icons8.com/color/480/sports-car.png">
      <h3>SPEED RUSH</h3>
      <p>Fast. Furious. Fun.</p>
      <button class="btn">▶ PLAY NOW</button>
    </div>

    <div class="card">
      <img src="https://img.icons8.com/color/480/running.png">
      <h3>STICK RUNNER</h3>
      <p>Run. Jump. Survive.</p>
      <button class="btn">▶ PLAY NOW</button>
    </div>

    <div class="card">
      <img src="https://img.icons8.com/color/480/tank.png">
      <h3>TANK BATTLE</h3>
      <p>Dominate the arena</p>
      <button class="btn">▶ PLAY NOW</button>
    </div>

  </div>
</div>

<script>
function playGame(name, url){
  window.location.href =
  "play.html?name="+encodeURIComponent(name)+
  "&url="+encodeURIComponent(url);
}
</script>

</body>
</html>
