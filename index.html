<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plutomars Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0b0f1a,#020617);
  color:white;
}

html{
  scroll-behavior:smooth;
}

/* CONTAINER */
.container{
  width:95%;
  max-width:1300px;
  margin:auto;
}

/* HEADER */
header{
  background:#0a0d16;
  padding:10px 0;
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo img{
  height:65px;
  filter: drop-shadow(0 0 10px #ff00ff);
}

/* NAV */
.nav{
  display:flex;
  gap:30px;
}

.nav a{
  color:#aaa;
  text-decoration:none;
  font-weight:bold;
  position:relative;
}

.nav a:hover{
  color:#ff00ff;
}

.nav a::after{
  content:"";
  position:absolute;
  width:0;
  height:2px;
  background:#ff00ff;
  left:0;
  bottom:-4px;
  transition:0.3s;
}

.nav a:hover::after{
  width:100%;
}

.live{
  color:red;
}

/* HERO + SLIDER */
.hero{
  position:relative;
  height:60vh;
  display:flex;
  align-items:center;
  overflow:hidden;
}

.slider{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-1;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:opacity 1s ease-in-out;
}

.slide.active{
  opacity:1;
}

.hero-box{
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:10px;
  max-width:500px;
}

.hero h1{
  font-size:34px;
}

.hero span{
  color:#ff00ff;
}

.hero p{
  color:#ccc;
}

.btn{
  background:#ff00ff;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px #ff00ff;
}

/* SECTION */
.section{
  padding:40px 0;
}

/* GAMES */
.games-row{
  display:flex;
  flex-wrap:wrap;
  gap:25px;
  margin-top:20px;
}

/* 🔥 CARD GLOW EFFECT */
.card{
  width:220px;
  background:#0f172a;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:0.4s;
}

/* LIGHT SWEEP */
.card::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,0,255,0.6), transparent);
  transition:0.6s;
}

.card:hover::before{
  left:100%;
}

/* STRONG GLOW */
.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:
    0 0 15px #ff00ff,
    0 0 30px rgba(255,0,255,0.7),
    0 0 60px rgba(255,0,255,0.4);
}

.card img{
  width:100%;
  border-radius:10px;
  transition:0.3s;
}

.card:hover img{
  transform:scale(1.05);
}

.card p{
  font-size:12px;
  color:#aaa;
}

/* LIVE */
#liveVideo{
  margin-top:15px;
  background:#000;
  padding:10px;
  border-radius:10px;
}

/* MOBILE */
@media(max-width:600px){
  .logo img{height:45px;}
  .nav{gap:12px;font-size:12px;}
  .games-row{overflow-x:auto;flex-wrap:nowrap;}
  .card{min-width:160px;}
  .hero{height:50vh;}
  .hero h1{font-size:22px;}
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">

    <div class="logo">
      <img src="assets/logo.png">
    </div>

    <div class="nav">
      <a href="#home">HOME</a>
      <a href="#games">GAMES</a>
      <a href="#live" class="live">● LIVE</a>
    </div>

  </div>
</header>

<!-- HERO -->
<div id="home" class="hero">

  <div class="slider">
    <img src="assets/banner1.jpg" class="slide active">
    <img src="assets/banner2.jpg" class="slide">
    <img src="assets/banner3.jpg" class="slide">
  </div>

  <div class="container">
    <div class="hero-box">
      <h1>PLAY GAMES.<br><span>HAVE FUN.</span></h1>
      <p>The best place to play free online games!</p>
      <button class="btn" onclick="scrollToGames()">🎮 EXPLORE</button>
    </div>
  </div>

</div>

<!-- GAMES -->
<div id="games" class="section">
  <div class="container">
    <h2>🎮 FEATURED GAMES</h2>

    <div class="games-row">

      <div class="card">
        <img src="assets/mines.jpg">
        <p>MINES</p>
        <button onclick="playGame('Mines','https://plutomarsgames.github.io/plutomarsgames01.github.io/')">▶ PLAY</button>
      </div>

      <div class="card">
        <img src="assets/findcoins.jpg">
        <p>FIND COINS</p>
        <button onclick="playGame('Find Coins','https://plutomarsgames.github.io/plutomarsgames02.github.io/')">▶ PLAY</button>
      </div>

      <div class="card">
        <img src="assets/carracing.jpg">
        <p>CAR RACING</p>
        <button onclick="playGame('Car Racing','https://plutomarsgames.github.io/plutomarsgames03.github.io/')">▶ PLAY</button>
      </div>

    </div>
  </div>
</div>

<!-- LIVE -->
<div id="live" class="section">
  <div class="container">
    <h2>🔴 LIVE STREAM</h2>

    <div id="liveVideo">Loading live...</div>

    <h2 style="margin-top:20px;"> LATEST VIDEOS</h2>
    <div id="videoList" class="games-row"></div>
  </div>
</div>

<script>
const API_KEY = "AIzaSyA_4LCieXQLzVHX7APxfr5_b6MtbgmPHjA";
const CHANNEL_ID = "UCdO65ekLVmHT48V-kJFE_Fg";

/* SLIDER */
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(()=>{
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
},3000);

/* EXPLORE */
function scrollToGames(){
  document.getElementById("games").scrollIntoView({
    behavior:"smooth"
  });
}

/* LIVE */
async function loadLive(){
  try{
    let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`);
    let data = await res.json();

    if(data.items && data.items.length > 0){
      let id = data.items[0].id.videoId;
      liveVideo.innerHTML =
      `<iframe width="100%" height="300" src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
    } else {
      liveVideo.innerHTML = "No live stream now";
    }
  }catch{
    liveVideo.innerHTML = "Live unavailable";
  }
}

/* VIDEOS */
async function loadVideos(){
  try{
    let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&maxResults=6&type=video&order=date&key=${API_KEY}`);
    let data = await res.json();

    let html="";
    data.items.forEach(v=>{
      html+=`
      <div class="card" onclick="window.open('https://youtube.com/watch?v=${v.id.videoId}','_blank')">
        <img src="${v.snippet.thumbnails.high.url}">
        <p>${v.snippet.title}</p>
      </div>`;
    });

    videoList.innerHTML = html;
  }catch{
    videoList.innerHTML = "Videos not loading";
  }
}

loadLive();
loadVideos();

/* PLAY GAME */
function playGame(name,url){
  if(window.innerWidth < 768){
    window.open(url,"_self");
  }else{
    window.location.href="play.html?name="+name+"&url="+url;
  }
}
</script>

</body>
</html>
