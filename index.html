<!DOCTYPE html>
<html>
<head>
  <title>Plutomars Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- HOME -->
  <div id="start-screen" class="card">
    <h1>🚀 PLUTOMARS</h1>

    <input type="text" id="username" placeholder="Enter username">

    <button onclick="createRoom()">🎮 Create Room</button>

    <h3>Available Rooms</h3>
    <div id="room-list"></div>

    <div class="divider"></div>

    <button onclick="playWithBot()">🤖 Play with BLACKMITH</button>
  </div>

  <!-- GAME -->
  <div id="game-screen" class="card hidden">
    <h2 id="status"></h2>
    <h3>🪙 Coins: <span id="score">0</span></h3>
    <div id="grid"></div>
  </div>

</div>

<!-- WIN SCREEN -->
<div id="win-screen" class="hidden">
  <h1 id="winner-text"></h1>
</div>

<!-- AUDIO -->
<audio id="coinSound" src="https://assets.mixkit.co/sfx/preview/mixkit-coins-handling-1939.mp3"></audio>
<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"></audio>
<audio id="bgMusic" src="https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3" loop></audio>

<script type="module" src="app.js"></script>
</body>
</html>
