<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plutomars Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050816;
  color:white;
}

/* CONTAINER (IMPORTANT) */
.container{
  width:90%;
  max-width:1200px;
  margin:auto;
}

/* HEADER */
header{
  background:#0a0d16;
  padding:10px 0;
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo img{
  height:60px;
}

/* NAV */
.nav{
  display:flex;
  gap:20px;
}

.nav a{
  color:#aaa;
  text-decoration:none;
  font-weight:bold;
}

.nav a:hover{
  color:gold;
}

.live{
  color:red;
}

/* HERO */
.hero{
  height:60vh;
  background:url("assets/hero.jpg") center/cover no-repeat;
  display:flex;
  align-items:center;
}

.hero-box{
  background:rgba(0,0,0,0.6);
  padding:25px;
  border-radius:10px;
  max-width:400px;
}

.hero h1{
  font-size:32px;
}

.hero span{
  color:#ff00ff;
}

.hero p{
  color:#ccc;
}

.btn{
  background:#ff00ff;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* SECTION */
.section{
  padding:40px 0;
}

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* GAME ROW */
.games-row{
  display:flex;
  gap:20px;
  margin-top:20px;
}

/* CARD */
.card{
  width:200px;
  background:#0f172a;
  padding:10px;
  border-radius:12px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 15px #ff00ff;
}

.card img{
  width:100%;
  border-radius:10px;
}

.card h3{
  font-size:14px;
}

.card p{
  font-size:12px;
  color:#aaa;
}

.card button{
  margin-top:5px;
  background:#ff00ff;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:600px){

  .logo img{
    height:40px;
  }

  .games-row{
    overflow-x:auto;
  }

  .card{
    min-width:160px;
  }

  .hero{
    height:50vh;
  }

  .hero h1{
    font-size:22px;
  }
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    
    <div class="logo">
      <img src="assets/logo.png">
    </div>

    <div class="nav">
      <a href="#">HOME</a>
      <a href="#">TRENDING</a>
      <a href="#" class="live">● LIVE</a>
      <a href="#">ALL GAMES</a>
    </div>

  </div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="container">
    <div class="hero-box">
      <h1>PLAY GAMES.<br><span>HAVE FUN.</span></h1>
      <p>The best place to play free online games!</p>
      <button class="btn">🎮 EXPLORE GAMES</button>
    </div>
  </div>
</div>

<!-- FEATURED -->
<div class="section">
  <div class="container">

    <div class="section-header">
      <h3>🎮 FEATURED GAMES</h3>
      <span style="color:#ff00ff;">VIEW ALL ➤</span>
    </div>

    <div class="games-row">

      <!-- MINES -->
      <div class="card">
        <img src="assets/mines.jpg">
        <h3>MINES</h3>
        <p>Classic mind game</p>
        <button onclick="playGame('Mines','https://plutomarsgames.github.io/plutomarsgames01.github.io/')">
          ▶ PLAY
        </button>
      </div>

      <!-- FIND COINS -->
      <div class="card">
        <img src="assets/findcoins.jpg">
        <h3>FIND COINS</h3>
        <p>Collect & survive</p>
        <button onclick="playGame('Find Coins','https://plutomarsgames.github.io/plutomarsgames02.github.io/')">
          ▶ PLAY
        </button>
      </div>

    </div>

  </div>
</div>

<script>
function playGame(name, url){
  window.location.href =
    "play.html?name="+encodeURIComponent(name)+
    "&url="+encodeURIComponent(url);
}
</script>

</body>
</html>
