<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plutomars Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

/* NAVBAR */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#0a0d16;
}

.logo img{
  height:45px;
}

.nav{
  display:flex;
  gap:15px;
  font-size:14px;
}

.nav a{
  color:#aaa;
  text-decoration:none;
  font-weight:bold;
}

.nav a:hover{
  color:gold;
}

.live{
  color:red;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.5;}
}

/* HERO */
.hero{
  height:55vh;
  background:url("assets/hero.jpg") center/cover no-repeat;
  display:flex;
  align-items:center;
}

.overlay{
  background:rgba(0,0,0,0.6);
  padding:20px;
  margin-left:20px;
  border-radius:10px;
}

.hero h1{
  font-size:28px;
}

.hero span{
  color:gold;
}

/* SECTION */
.section{
  padding:15px;
}

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* HORIZONTAL SCROLL (LIKE CRAZYGAMES) */
.scroll-row{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding-top:10px;
}

.scroll-row::-webkit-scrollbar{
  display:none;
}

/* CARD */
.card{
  min-width:150px;
  background:#111827;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 0 15px gold;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  display:block;
}

.card-content{
  padding:8px;
}

.card h3{
  font-size:13px;
  margin:5px 0;
}

.card p{
  font-size:11px;
  color:#aaa;
}

.btn{
  background:gold;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  font-size:11px;
  font-weight:bold;
}

/* MOBILE */
@media(max-width:600px){
  .hero{
    height:45vh;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="assets/logo.png">
  </div>

  <div class="nav">
    <a href="#">HOME</a>
    <a href="#">TRENDING</a>
    <a href="#" class="live">🔴 LIVE</a>
    <a href="#">ALL</a>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="overlay">
    <h1>PLAY GAMES<br><span>HAVE FUN</span></h1>
  </div>
</div>

<!-- FEATURED GAMES -->
<div class="section">

  <div class="section-header">
    <h3>🎮 FEATURED GAMES</h3>
    <span style="color:gold;">VIEW ALL ➤</span>
  </div>

  <div class="scroll-row">

    <!-- MINES -->
    <div class="card">
      <img src="assets/mines.jpg">
      <div class="card-content">
        <h3>MINES</h3>
        <p>Classic mind game</p>
        <button class="btn"
        onclick="playGame('Mines','https://plutomarsgames.github.io/plutomarsgames01.github.io/')">
        ▶ PLAY
        </button>
      </div>
    </div>

    <!-- FIND COINS -->
    <div class="card">
      <img src="assets/findcoins.jpg">
      <div class="card-content">
        <h3>FIND COINS</h3>
        <p>Collect & survive</p>
        <button class="btn"
        onclick="playGame('Find Coins','https://plutomarsgames.github.io/plutomarsgames02.github.io/')">
        ▶ PLAY
        </button>
      </div>
    </div>

  </div>

</div>

<script>
function playGame(name, url){
  window.location.href =
  "play.html?name="+encodeURIComponent(name)+
  "&url="+encodeURIComponent(url);
}
</script>

</body>
</html>
