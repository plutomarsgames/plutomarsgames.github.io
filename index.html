<!DOCTYPE html>
<html>
<head>
  <title>Plutomars Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="start-screen">
<hr>

<h3>❤️ Support Developer</h3>

<p>UPI ID: <b id="upi-text">plutomars@slc</b></p>

<img 
  src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=upi://pay?pa=plutomars@slc&pn=Plutomars&cu=INR" 
  alt="UPI QR Code"
  style="border-radius:10px; margin-top:10px;"
>

<br><br>

<button onclick="copyUPI()">📋 Copy UPI ID</button>

  <h1>🚀 PLUTOMARS GAMES</h1>

  <input type="text" id="username" placeholder="Enter username"><br>
  <button onclick="createRoom()">Create Room</button>

  <h3>Available Rooms</h3>
  <div id="room-list">Loading...</div>

  <br><hr><br>

  <button onclick="playWithBot()">Play with BLACKMITH 🤖</button>
</div>

<div id="game-screen" class="hidden">
  <h2 id="player"></h2>
  <h3 id="status"></h3>
  <h3>Coins: <span id="score">0</span></h3>
  <div id="grid"></div>
</div>

<script type="module" src="app.js"></script>
<script>
function copyUPI() {
  navigator.clipboard.writeText("plutomars@slc");
  alert("UPI ID copied: plutomars@slc");
}
</script>
<p style="color:gray; font-size:14px;">
  Your support helps improve Plutomars 🚀
</p>
</body>
</html>
