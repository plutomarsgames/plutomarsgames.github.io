<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plutomars Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

/* NAVBAR */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#0a0d16;
}

.logo img{
  height:55px;
  filter:drop-shadow(0 0 10px #ff00ff);
}

.nav{
  display:flex;
  gap:25px;
}

.nav a{
  color:#aaa;
  text-decoration:none;
  font-weight:bold;
}

.nav a:hover{
  color:gold;
}

.live{
  color:red;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.5;}
}

/* HERO */
.hero{
  margin:20px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

.hero img{
  width:100%;
}

.hero-text{
  position:absolute;
  top:30%;
  left:40px;
}

.hero h1{
  font-size:50px;
}

.hero span{
  color:gold;
}

.btn{
  background:gold;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* SECTION */
.section{
  padding:20px;
}

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:15px;
}

.card{
  background:#111827;
  border-radius:15px;
  padding:10px;
  transition:0.3s;
  box-shadow:0 0 10px rgba(255,255,255,0.05);
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 20px gold;
}

.card img{
  width:100%;
  border-radius:10px;
}

.card h3{
  margin:10px 0;
}

.card p{
  color:#aaa;
  font-size:14px;
}

/* MOBILE */
@media(max-width:768px){
  .hero h1{font-size:28px;}
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="assets/logo.png">
  </div>

  <div class="nav">
    <a href="#">HOME</a>
    <a href="#">TRENDING</a>
    <a href="#" class="live">🔴 LIVE</a>
    <a href="#">ALL GAMES</a>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <img src="assets/banner.jpg">

  <div class="hero-text">
    <h1>PLAY GAMES.<br><span>HAVE FUN.</span></h1>
    <button class="btn">🎮 EXPLORE GAMES</button>
  </div>
</div>

<!-- WORKING GAMES ONLY -->
<div class="section">
  <div class="section-header">
    <h2>🎮 PLAY NOW</h2>
  </div>

  <div class="grid">

    <!-- MINES -->
    <div class="card">
      <img src="assets/mines.jpg">
      <h3>MINES</h3>
      <p>Classic mind game</p>
      <button class="btn"
      onclick="playGame('Mines','https://plutomarsgames.github.io/plutomarsgames01.github.io/')">
      ▶ PLAY NOW
      </button>
    </div>

    <!-- GAME 2 -->
    <div class="card">
      <img src="assets/car.jpg">
      <h3>GAME 2</h3>
      <p>New action game</p>
      <button class="btn"
      onclick="playGame('Game 2','https://plutomarsgames.github.io/plutomarsgames02.github.io/')">
      ▶ PLAY NOW
      </button>
    </div>

  </div>
</div>

<script>
function playGame(name, url){
  window.location.href =
  "play.html?name="+encodeURIComponent(name)+
  "&url="+encodeURIComponent(url);
}
</script>

</body>
</html>
