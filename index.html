<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plutomars Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

/* NAVBAR */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#0a0d16;
}

.logo img{
  height:45px;
  filter:drop-shadow(0 0 8px #ff00ff);
}

.nav{
  display:flex;
  gap:15px;
  font-size:14px;
}

.nav a{
  color:#aaa;
  text-decoration:none;
  font-weight:bold;
}

.nav a:hover{
  color:gold;
}

.live{
  color:red;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.5;}
}

/* HERO */
.hero{
  height:60vh;
  background:url("assets/hero.jpg") center/cover no-repeat;
  display:flex;
  align-items:center;
}

.overlay{
  background:rgba(0,0,0,0.6);
  padding:25px;
  margin-left:20px;
  border-radius:10px;
}

.hero h1{
  font-size:32px;
}

.hero span{
  color:gold;
}

.btn{
  background:gold;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  font-size:13px;
}

/* SECTION */
.section{
  padding:15px;
}

/* GRID (PRO STYLE) */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:12px;
}

/* CARD */
.card{
  background:#111827;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 0 15px gold;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  display:block;
}

.card-content{
  padding:8px;
}

.card h3{
  font-size:14px;
  margin:5px 0;
}

.card p{
  font-size:12px;
  color:#aaa;
  margin-bottom:6px;
}

/* MOBILE FIX */
@media(max-width:600px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }

  .hero{
    height:50vh;
  }

  .hero h1{
    font-size:24px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="assets/logo.png">
  </div>

  <div class="nav">
    <a href="#">HOME</a>
    <a href="#">TRENDING</a>
    <a href="#" class="live">🔴 LIVE</a>
    <a href="#">ALL</a>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="overlay">
    <h1>ELEVATE YOUR<br><span>GAMING</span></h1>
    <button class="btn">EXPLORE</button>
  </div>
</div>

<!-- GAMES -->
<div class="section">
  <h3>🎮 PLAY NOW</h3>

  <div class="grid">

    <!-- MINES -->
    <div class="card">
      <img src="assets/mines.jpg">
      <div class="card-content">
        <h3>MINES</h3>
        <p>Classic mind game</p>
        <button class="btn"
        onclick="playGame('Mines','https://plutomarsgames.github.io/plutomarsgames01.github.io/')">
        ▶ PLAY
        </button>
      </div>
    </div>

    <!-- FIND COINS -->
    <div class="card">
      <img src="assets/findcoins.jpg">
      <div class="card-content">
        <h3>FIND COINS</h3>
        <p>Collect & survive</p>
        <button class="btn"
        onclick="playGame('Find Coins','https://plutomarsgames.github.io/plutomarsgames02.github.io/')">
        ▶ PLAY
        </button>
      </div>
    </div>

  </div>
</div>

<script>
function playGame(name, url){
  window.location.href =
  "play.html?name="+encodeURIComponent(name)+
  "&url="+encodeURIComponent(url);
}
</script>

</body>
</html>
