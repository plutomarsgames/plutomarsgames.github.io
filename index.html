<div class="games">

  <!-- GAME 1 -->
  <div class="card">
    <h2>Game 01</h2>
    <button class="btn"
      onclick="playGame(
        'Game 01',
        'https://plutomarsgames.github.io/plutomarsgames01.github.io/'
      )">
      Play
    </button>
  </div>

  <!-- GAME 2 -->
  <div class="card">
    <h2>Game 02</h2>
    <button class="btn"
      onclick="playGame(
        'Game 02',
        'https://plutomarsgames.github.io/plutomarsgames02.github.io/'
      )">
      Play
    </button>
  </div>

</div>
<script>
function playGame(name, url) {
  window.location.href =
    "play.html?name=" + encodeURIComponent(name) +
    "&url=" + encodeURIComponent(url);
}
</script>
