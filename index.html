<!DOCTYPE html>
<html>
<head>
  <title>Plutomars Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: #111;
    }

    .logo img {
      height: 55px;
      filter: drop-shadow(0 0 15px #ff00ff);
    }

    .banner {
      background: linear-gradient(90deg, red, orange);
      padding: 8px;
      text-align: center;
      font-weight: bold;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.6; }
    }

    .hero {
      padding: 60px 20px;
      text-align: center;
      background: radial-gradient(circle at center, #111, #000);
    }

    .hero h1 {
      font-size: 40px;
    }

    .hero span {
      color: gold;
    }

    .btn {
      padding: 10px 15px;
      background: gold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .stream {
      padding: 20px;
    }

    .stream iframe {
      width: 100%;
      height: 220px;
      border-radius: 10px;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #151515;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    @media(min-width:768px){
      .hero h1 { font-size: 55px; }
      .stream iframe { height: 400px; }
    }

  </style>
</head>

<body>

<header>
  <div class="logo">
    <img src="assets/logo.png">
  </div>
</header>

<div class="banner">
  🔴 LIVE UPDATE: New Games Coming Soon!
</div>

<div class="hero">
  <h1>PLAY GAMES.<br><span>HAVE FUN.</span></h1>
  <button class="btn" onclick="scrollToGames()">🎮 Explore Games</button>
</div>

<div class="stream">
  <h2>🔴 Streaming Now</h2>
  <iframe src="https://www.youtube.com/live/lBFQHOeqyM8?si=Uy2XDnyiuy8FZ1Tj"></iframe>
</div>

<div class="games" id="games">

  <div class="card">
    <img src="https://img.icons8.com/color/480/minesweeper.png">
    <h3>Mines</h3>
    <button class="btn"
      onclick="playGame('Mines','https://plutomarsgames.github.io/plutomarsgames01.github.io/')">
      Play
    </button>
  </div>

  <div class="card">
    <img src="https://img.icons8.com/color/480/car.png">
    <h3>Game 2</h3>
    <button class="btn"
      onclick="playGame('Game 2','https://plutomarsgames.github.io/plutomarsgames02.github.io/')">
      Play
    </button>
  </div>

</div>

<script>
function scrollToGames() {
  document.getElementById("games").scrollIntoView();
}

function playGame(name, url) {
  window.location.href =
    "play.html?name=" + encodeURIComponent(name) +
    "&url=" + encodeURIComponent(url);
}
</script>

</body>
</html>
