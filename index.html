<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plutomars Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0b0f1a,#020617);
  color:white;
}

/* CONTAINER */
.container{
  width:95%;
  max-width:1300px;
  margin:auto;
}

/* HEADER */
header{
  background:#0a0d16;
  padding:10px 0;
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo img{
  height:65px;
}

/* NAV */
.nav{
  display:flex;
  gap:30px;
}

.nav a{
  color:#aaa;
  text-decoration:none;
  font-weight:bold;
}

.nav a:hover{
  color:#ff00ff;
}

.live{
  color:red;
}

/* HERO */
.hero{
  height:60vh;
  background:url("assets/hero.jpg") center/cover no-repeat;
  display:flex;
  align-items:center;
}

.hero-box{
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:10px;
  max-width:500px;
}

.hero h1{
  font-size:34px;
}

.hero span{
  color:#ff00ff;
}

.hero p{
  color:#ccc;
}

.btn{
  background:#ff00ff;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* SECTION */
.section{
  padding:40px 0;
}

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* GAMES */
.games-row{
  display:flex;
  flex-wrap:wrap;
  gap:25px;
  margin-top:20px;
}

/* CARD */
.card{
  width:220px;
  background:#0f172a;
  padding:12px;
  border-radius:12px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px) scale(1.03);
  box-shadow:0 0 20px #ff00ff;
}

.card img{
  width:100%;
  border-radius:10px;
}

.card h3{
  font-size:14px;
}

.card p{
  font-size:12px;
  color:#aaa;
}

.card button{
  margin-top:5px;
  background:#ff00ff;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

/* LIVE SECTION */
#liveVideo{
  margin-top:15px;
  background:#000;
  padding:10px;
  border-radius:10px;
}

/* MOBILE */
@media(max-width:600px){

  .logo img{
    height:45px;
  }

  .nav{
    gap:12px;
    font-size:12px;
  }

  .games-row{
    overflow-x:auto;
    flex-wrap:nowrap;
  }

  .card{
    min-width:160px;
  }

  .hero{
    height:50vh;
  }

  .hero h1{
    font-size:22px;
  }
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">

    <div class="logo">
      <img src="assets/logo.png">
    </div>

    <div class="nav">
      <a href="#home">HOME</a>
      <a href="#games">GAMES</a>
      <a href="#live" class="live">● LIVE</a>
    </div>

  </div>
</header>

<!-- HERO -->
<div id="home" class="hero">
  <div class="container">
    <div class="hero-box">
      <h1>PLAY GAMES.<br><span>HAVE FUN.</span></h1>
      <p>The best place to play free online games!</p>
      <button class="btn">🎮 EXPLORE</button>
    </div>
  </div>
</div>

<!-- GAMES -->
<div id="games" class="section">
  <div class="container">
    <div class="section-header">
      <h2>🎮 FEATURED GAMES</h2>
    </div>

    <div class="games-row">

      <div class="card">
        <img src="assets/mines.jpg">
        <h3>MINES</h3>
        <p>Classic mind game</p>
        <button onclick="playGame('Mines','https://plutomarsgames.github.io/plutomarsgames01.github.io/')">
          ▶ PLAY
        </button>
      </div>

      <div class="card">
        <img src="assets/findcoins.jpg">
        <h3>FIND COINS</h3>
        <p>Collect & survive</p>
        <button onclick="playGame('Find Coins','https://plutomarsgames.github.io/plutomarsgames02.github.io/')">
          ▶ PLAY
        </button>
      </div>
      
      <div class="card">
        <img src="assets/carracing.jpg">
        <h3>CAR RACING</h3>
        <p>Collect & survive</p>
        <button onclick="playGame('Find Coins','https://plutomarsgames.github.io/plutomarsgames03.github.io/')">
          ▶ PLAY
        </button>
      </div>
      
    </div>
  </div>
</div>

<!-- LIVE -->
<div id="live" class="section">
  <div class="container">
    <h2>🔴 LIVE STREAM</h2>

    <div id="liveVideo">Live streaming loading...</div>

    <h2>Latest Videos</h2>
    <div id="videoList" class="games-row"></div>
  </div>
</div>

<script>
const API_KEY = "AIzaSyDZd_7GY24xAMqgGUzbDhTFmZZ-3DTZBv0";
const CHANNEL_ID = "UCdO65ekLVmHT48V-kJFE_Fg";

/* LIVE VIDEO */
async function loadLive(){
  try{
    let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`);
    let data = await res.json();

    if(data.items.length > 0){
      let id = data.items[0].id.videoId;
      liveVideo.innerHTML = `<iframe width="100%" height="300" src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
    }else{
      liveVideo.innerHTML = "<p>No live stream now</p>";
    }
  }catch{
    liveVideo.innerHTML = "<p>Live unavailable</p>";
  }
}

/* VIDEOS */
async function loadVideos(){
  try{
    let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&maxResults=6&type=video&order=date&key=${API_KEY}`);
    let data = await res.json();

    let html="";
    data.items.forEach(v=>{
  html+=`
  <div class="card" onclick="window.open('https://youtube.com/watch?v=${v.id.videoId}','_blank')">
    <img src="${v.snippet.thumbnails.high.url}">
    <p>${v.snippet.title}</p>
  </div>`;
});
    videoList.innerHTML = html;
  }catch{
    videoList.innerHTML = "<p>Videos not loading</p>";
  }
}

loadLive();
loadVideos();

/* PLAY GAME */
function playGame(name,url){
  if(window.innerWidth < 768){
    // MOBILE → open directly
    window.open(url, "_self");
  }else{
    // DESKTOP → use iframe page
    window.location.href="play.html?name="+name+"&url="+url;
  }
}
</script>

</body>
</html>
