<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plutomars Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050816;
  color:white;
}

.container{
  width:95%;
  max-width:1300px;
  margin:auto;
}

header{
  background:#0a0d16;
  padding:10px 0;
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo img{
  height:60px;
}

.nav{
  display:flex;
  gap:25px;
}

.nav a{
  color:#aaa;
  text-decoration:none;
  font-weight:bold;
}

.nav a:hover{
  color:#ff00ff;
}

.hero{
  height:60vh;
  background:url("assets/hero.jpg") center/cover no-repeat;
  display:flex;
  align-items:center;
}

.hero-box{
  background:rgba(0,0,0,0.6);
  padding:25px;
  border-radius:10px;
}

.section{
  padding:40px 0;
}

/* VIDEO GRID */
.video-row{
  display:flex;
  gap:20px;
  overflow-x:auto;
}

.video-card{
  width:240px;
  background:#0f172a;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}

.video-card img{
  width:100%;
}

.video-card p{
  padding:8px;
  font-size:12px;
}

.live-box{
  margin-top:20px;
  border-radius:10px;
  overflow:hidden;
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <div class="logo">
      <img src="assets/logo.png">
    </div>

    <div class="nav">
      <a href="#home">HOME</a>
      <a href="#live">LIVE</a>
    </div>
  </div>
</header>

<!-- HERO -->
<div id="home" class="hero">
  <div class="container">
    <div class="hero-box">
      <h1>PLUTOMARS GAMES</h1>
    </div>
  </div>
</div>

<!-- LIVE SECTION -->
<div id="live" class="section">
  <div class="container">

    <h2>🔴 LIVE STREAM</h2>
    <div id="liveVideo" class="live-box">Loading live...</div>

    <h2>📺 LATEST VIDEOS</h2>
    <div id="videoList" class="video-row"></div>

  </div>
</div>

<script>
const API_KEY = "AIzaSyDZd_7GY24xAMqgGUzbDhTFmZZ-3DTZBv0";
const CHANNEL_ID = "UCdO65ekLVmHT48V-kJFE_Fg";

/* LOAD LIVE */
async function loadLive(){
  try{
    let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`);
    let data = await res.json();

    if(data.items && data.items.length > 0){
      let id = data.items[0].id.videoId;

      document.getElementById("liveVideo").innerHTML =
      `<iframe width="100%" height="350"
      src="https://www.youtube.com/embed/${id}"
      allowfullscreen></iframe>`;
    } else {
      liveVideo.innerHTML = "<p>No live stream now</p>";
    }
  }catch(e){
    liveVideo.innerHTML = "<p>Error loading live</p>";
  }
}

/* LOAD VIDEOS */
async function loadVideos(){
  try{
    let res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&maxResults=8&type=video&order=date&key=${API_KEY}`);
    let data = await res.json();

    let html="";

    data.items.forEach(v=>{
      let id = v.id.videoId;

      html+=`
      <div class="video-card" onclick="openVideo('${id}')">
        <img src="${v.snippet.thumbnails.high.url}">
        <p>${v.snippet.title}</p>
      </div>`;
    });

    videoList.innerHTML = html;
  }catch(e){
    videoList.innerHTML = "<p>Videos not loading</p>";
  }
}

function openVideo(id){
  window.open("https://www.youtube.com/watch?v="+id, "_blank");
}

loadLive();
loadVideos();
</script>

</body>
</html>
