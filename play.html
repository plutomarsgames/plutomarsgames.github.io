<!DOCTYPE html>
<html>
<head>
<title>Play Game</title>

<style>
body{margin:0;background:black;color:white;font-family:Arial;}

.topbar{
  background:#111;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

iframe{
  width:100%;
  height:90vh;
  border:none;
}

button{
  background:#ff00ff;
  border:none;
  padding:6px 12px;
  color:white;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="topbar">
  <h3 id="title"></h3>
  <button onclick="location.href='index.html'">⬅ Back</button>
</div>

<iframe id="frame"></iframe>

<script>
const p=new URLSearchParams(location.search);
frame.src=p.get("url");
title.innerText=p.get("name");
</script>

</body>
</html>
