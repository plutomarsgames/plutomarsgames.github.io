<!DOCTYPE html>
<html>
<head>
<title>Play Game</title>

<style>
body{margin:0;background:black;color:white;font-family:Arial;}

.topbar{
  background:#111;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.back{
  background:gold;
  border:none;
  padding:6px 12px;
  border-radius:6px;
}

iframe{
  width:100%;
  height:90vh;
  border:none;
}
</style>
</head>

<body>

<div class="topbar">
  <h3 id="title"></h3>
  <button class="back" onclick="location.href='index.html'">⬅</button>
</div>

<iframe id="gameFrame"></iframe>

<script>
const p = new URLSearchParams(location.search);
document.getElementById("gameFrame").src = p.get("url");
document.getElementById("title").innerText = p.get("name");
</script>

</body>
</html>
