<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Play Game</title>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial;}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#0a0d16;
}

.back-btn{
  background:#ff00ff;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

iframe{
  width:100%;
  height:calc(100vh - 50px);
  border:none;
}
</style>
</head>

<body>

<div class="topbar">
<button class="back-btn" onclick="goBack()">⬅ BACK</button>
<span id="gameName">Game</span>
</div>

<iframe id="gameFrame"></iframe>

<script>
const p = new URLSearchParams(location.search);
document.getElementById("gameFrame").src = p.get("url");
document.getElementById("gameName").innerText = p.get("name");

function goBack(){
  window.location.href="index.html";
}
</script>

</body>
</html>
