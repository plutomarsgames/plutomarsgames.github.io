<!DOCTYPE html>
<html>
<head>
<title>Play Game</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
}

.topbar{
  background:#111;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.back{
  background:gold;
  border:none;
  padding:8px 15px;
  border-radius:8px;
  cursor:pointer;
}

iframe{
  width:100%;
  height:90vh;
  border:none;
}
</style>
</head>

<body>

<div class="topbar">
  <h2 id="title">Game</h2>
  <button class="back" onclick="goBack()">⬅ Back</button>
</div>

<iframe id="gameFrame"></iframe>

<script>
const params = new URLSearchParams(window.location.search);
document.getElementById("gameFrame").src = params.get("url");
document.getElementById("title").innerText = params.get("name");

function goBack(){
  window.location.href="index.html";
}
</script>

</body>
</html>
