<!DOCTYPE html>
<html>
<head>
  <title>Play Game</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
    }

    .topbar {
      background: #111;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .back {
      background: gold;
      padding: 8px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 90vh;
      border: none;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h2 id="title">Game</h2>
  <button class="back" onclick="goBack()">⬅ Back</button>
</div>

<iframe id="gameFrame"></iframe>

<script>
  const params = new URLSearchParams(window.location.search);
  const gameUrl = params.get("url");
  const gameName = params.get("name");

  document.getElementById("gameFrame").src = gameUrl;
  document.getElementById("title").innerText = gameName;

  function goBack() {
    window.location.href = "index.html";
  }
</script>

</body>
</html>
